{% extends 'users/userbase.html' %}
{% load static %}
{% block contents %}

<style>
* {
    box-sizing: border-box;
}

body {
    background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
    padding: 40px 20px;
    min-height: 100vh;
    font-family: 'Segoe UI', Arial, sans-serif;
}

.form-container {
    max-width: 1100px;
    margin: 0 auto;
    background: rgba(255,255,255,0.98);
    padding: 50px;
    border-radius: 25px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    border: 3px solid #2E86DE;
    position: relative;
    overflow: hidden;
}

.form-container::before {
    content: '';
    position: absolute;
    top: -2px;
    left: -2px;
    right: -2px;
    bottom: -2px;
    background: linear-gradient(45deg, #2E86DE, #00D4FF, #2E86DE);
    border-radius: 27px;
    z-index: -1;
    animation: borderRotate 4s linear infinite;
}

@keyframes borderRotate {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

h2 {
    text-align: center;
    background: linear-gradient(45deg, #2E86DE, #00D4FF);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    font-size: 2.8em;
    font-weight: 700;
    margin-bottom: 12px;
    letter-spacing: 1px;
}

.subtitle {
    text-align: center;
    color: #34495E;
    font-size: 1.3em;
    font-weight: 600;
    margin-bottom: 40px;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 30px;
    margin-bottom: 35px;
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

label {
    font-weight: 600;
    font-size: 1em;
    color: #2C3E50;
    padding: 6px 10px;
    background: linear-gradient(135deg, #ECF0F1, #D5DBDB);
    border: 1px solid #BDC3C7;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(46,134,222,0.15);
    transition: all 0.3s ease;
    text-shadow: none;
}

label:hover {
    background: linear-gradient(135deg, #2E86DE, #4A90E2);
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(46,134,222,0.3);
}

input, select {
    width: 100%;
    padding: 15px 18px;
    font-size: 15px;
    border: 2px solid #2E86DE;
    border-radius: 12px;
    background: linear-gradient(145deg, #F8FBFF, #FFFFFF);
    box-shadow: 0 3px 12px rgba(46,134,222,0.1);
    transition: all 0.3s ease;
    height: 52px;
    font-weight: 500;
    color: #2C3E50;
}

input:focus, select:focus {
    outline: none;
    border-color: #00D4FF;
    box-shadow: 0 0 15px rgba(46,134,222,0.3), 0 0 0 3px rgba(46,134,222,0.1);
    transform: translateY(-1px);
}

input:hover, select:hover {
    border-color: #00D4FF;
    box-shadow: 0 5px 15px rgba(46,134,222,0.2);
    transform: translateY(-1px);
}

.predict-btn {
    width: 100%;
    padding: 20px 40px;
    font-size: 1.5em;
    font-weight: 700;
    background: linear-gradient(45deg, #2E86DE, #00D4FF);
    color: white;
    border: 3px solid #2E86DE;
    border-radius: 15px;
    cursor: pointer;
    box-shadow: 0 8px 25px rgba(46,134,222,0.3);
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 1px;
    position: relative;
    overflow: hidden;
}

.predict-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
    transition: left 0.6s;
}

.predict-btn:hover::before {
    left: 100%;
}

.predict-btn:hover {
    transform: translateY(-4px);
    box-shadow: 0 15px 35px rgba(46,134,222,0.5);
}

.predict-btn:active {
    transform: translateY(-1px);
}

.prediction-result {
    margin-top: 30px;
    padding: 25px;
    border-radius: 15px;
    text-align: center;
    font-size: 1.4em;
    font-weight: 700;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    border: 3px solid #2E86DE;
    animation: pulse 2s infinite;
}

.prediction-safe {
    border-color: #27AE60;
    color: #2C3E50;
    background: linear-gradient(135deg, #D5F4E6, #ABEBC6);
}

.prediction-risk {
    border-color: #E74C3C;
    color: white;
    background: linear-gradient(135deg, #FADBD8, #F5B7B1);
}

@keyframes pulse {
    0%, 100% { box-shadow: 0 0 10px rgba(46,134,222,0.3); }
    50% { box-shadow: 0 0 25px rgba(46,134,222,0.6); }
}

@media (max-width: 768px) {
    .form-container { padding: 30px 20px; margin: 20px 10px; }
    .form-grid { grid-template-columns: 1fr; gap: 20px; }
    h2 { font-size: 2.2em; }
}
</style>

<div class="form-container">
    <h2>🫀 Heart Disease Prediction</h2>
    <p class="subtitle">Patient Health Assessment Form</p>

    <form method="post">
        {% csrf_token %}
        
        <div class="form-grid">
            <!-- Left Column -->
            <div>
                <div class="form-group">
                    <label>Age</label>
                    <input type="number" name="age" required min="20" max="100" placeholder="20-100">
                </div>

                <div class="form-group">
                    <label>Sex</label>
                    <select name="sex" required>
                        <option value="">Select</option>
                        <option value="0">Female</option>
                        <option value="1">Male</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Chest Pain Type (cp)</label>
                    <select name="cp" required>{% for val, name in cp_choices %}<option value="{{ val }}">{{ name }}</option>{% endfor %}</select>
                </div>

                <div class="form-group">
                    <label>Resting BP (trestbps)</label>
                    <input type="number" name="trestbps" required min="70" max="250" placeholder="70-250">
                </div>

                <div class="form-group">
                    <label>Cholesterol</label>
                    <input type="number" name="chol" required min="100" max="600" placeholder="100-600">
                </div>

                <div class="form-group">
                    <label>Fasting Blood Sugar (fbs)</label>
                    <select name="fbs" required>
                        <option value="">Select</option>
                        <option value="0">< 120 mg/dl</option>
                        <option value="1">> 120 mg/dl</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Rest ECG</label>
                    <select name="restecg" required>{% for val, name in restecg_choices %}<option value="{{ val }}">{{ name }}</option>{% endfor %}</select>
                </div>
            </div>

            <!-- Right Column -->
            <div>
                <div class="form-group">
                    <label>Max Heart Rate (thalach)</label>
                    <input type="number" name="thalach" required min="70" max="220" placeholder="70-220">
                </div>

                <div class="form-group">
                    <label>Exercise Angina (exang)</label>
                    <select name="exang" required>
                        <option value="">Select</option>
                        <option value="0">No</option>
                        <option value="1">Yes</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Oldpeak</label>
                    <input type="number" step="0.1" name="oldpeak" required min="0" max="6.2" placeholder="0.0-6.2">
                </div>

                <div class="form-group">
                    <label>Slope</label>
                    <select name="slope" required>{% for val, name in slope_choices %}<option value="{{ val }}">{{ name }}</option>{% endfor %}</select>
                </div>

                <div class="form-group">
                    <label>Major Vessels (ca)</label>
                    <input type="number" name="ca" required min="0" max="4" placeholder="0-4">
                </div>

                <div class="form-group">
                    <label>Thal</label>
                    <select name="thal" required>{% for val, name in thal_choices %}<option value="{{ val }}">{{ name }}</option>{% endfor %}</select>
                </div>
            </div>
        </div>

        <button type="submit" class="predict-btn">🔍 Analyze Risk</button>
    </form>

    {% if prediction %}
    <div class="prediction-result {% if 'No' in prediction %}prediction-safe{% else %}prediction-risk{% endif %}">
        📊 RESULT: {{ prediction }}
    </div>
    {% endif %}
</div>

{% endblock %}
